services:
  claude-dev:
    build: .
    volumes:
      - .:/workspace
      - node_modules:/workspace/node_modules
      - ${HOME}/.claude:/home/claude/.claude
      - ${HOME}/.claude.json:/home/claude/.claude.json
    ports:
      - "5173:5173"
      - "4173:4173"
      - "3000:3000"
    environment:
      - VITE_HOST=0.0.0.0
    stdin_open: true
    tty: true
    working_dir: /workspace

volumes:
  node_modules:
